<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1410">
<title>소형 도서관</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --ink:#1a1410; --paper:#ece3d0; --paper2:#e3d8bf;
    --leather:#7a3b2e; --gold:#c9a44c; --muted:#8a7d66; --line:#cdbfa2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--ink); color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Helvetica Neue",sans-serif;
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header{
    padding:22px 20px 14px;
    background:linear-gradient(180deg,#241a12,#1a1410);
    border-bottom:1px solid #2e2014;
    position:sticky; top:0; z-index:20; backdrop-filter:blur(6px);
  }
  h1{margin:0; font-size:25px; letter-spacing:2px; font-family:Georgia,"Apple SD Gothic Neo",serif; font-weight:700;}
  .sub{font-size:11px; color:var(--gold); letter-spacing:3px; text-transform:uppercase; margin-top:3px;}
  .tagline{margin-top:6px; font-size:12px; color:var(--muted);}
  .filters{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
  .chip{font-size:13px; font-weight:600; padding:6px 14px; border-radius:16px; background:transparent; color:var(--muted); border:1px solid #4a3826;}
  .chip.on{background:var(--gold); color:#2a1d12; border-color:var(--gold);}

  .shelf-wrap{padding:18px 14px 40px;}
  .shelf{margin-bottom:26px;}
  .shelf-label{font-size:12px; color:var(--gold); letter-spacing:2px; margin:0 4px 10px; font-weight:600; text-transform:uppercase; display:flex; align-items:center; gap:8px;}
  .shelf-label::after{content:""; flex:1; height:1px; background:linear-gradient(90deg,#4a3826,transparent);}
  .books{display:flex; gap:9px; overflow-x:auto; padding:6px 4px 16px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch;}
  .books::-webkit-scrollbar{height:0;}

  .spine{
    flex:0 0 auto; width:52px; height:190px; border-radius:3px 6px 6px 3px;
    position:relative; scroll-snap-align:start; cursor:pointer;
    box-shadow:inset -4px 0 8px rgba(0,0,0,0.4), inset 4px 0 5px rgba(255,255,255,0.14), 2px 3px 9px rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center; transition:transform .18s ease; overflow:hidden;
  }
  .spine:active{transform:translateY(-5px);}
  /* 책등 세로 가죽 결 */
  .spine::before{content:""; position:absolute; left:6px; top:0; bottom:0; width:2px; background:rgba(0,0,0,0.28);}
  .spine::after{content:""; position:absolute; right:0; top:0; bottom:0; width:5px; background:linear-gradient(90deg,transparent,rgba(0,0,0,0.45));}
  /* 금박 이중 띠 (위) */
  .spine-band{position:absolute; left:0; right:0; height:14px; box-sizing:border-box; border-top:1.5px solid rgba(201,164,76,0.9); border-bottom:1.5px solid rgba(201,164,76,0.9); background:rgba(201,164,76,0.18);}
  .spine-band.top{top:14px;} .spine-band.bot{bottom:14px;}
  /* 제목 칸 (금박 테두리 안) */
  .spine-title{writing-mode:vertical-rl; font-family:Georgia,"Apple SD Gothic Neo",serif; font-weight:700; font-size:13.5px; color:#f6eed6; text-shadow:0 1px 2px rgba(0,0,0,0.6); letter-spacing:1.5px; padding:12px 3px; max-height:62%; overflow:hidden; border:1px solid rgba(201,164,76,0.55); border-radius:3px;}
  .read-dot{position:absolute; top:6px; right:6px; width:9px; height:9px; border-radius:50%; background:#7fdca0; box-shadow:0 0 6px #7fdca0; display:none;}
  .spine.read .read-dot{display:block;}

  .overlay{position:fixed; inset:0; z-index:100; background:rgba(10,7,4,0.7); backdrop-filter:blur(3px); display:none; align-items:flex-end;}
  .overlay.show{display:flex;}
  .sheet{width:100%; height:92vh; max-height:92vh; background:var(--paper); color:var(--ink); border-radius:18px 18px 0 0; overflow:hidden; -webkit-overflow-scrolling:touch; animation:rise .28s cubic-bezier(.2,.7,.3,1); position:relative; display:flex; flex-direction:column;}
  .sheet-head{flex:0 0 auto;}
  .sheet-body{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .jumpbar{flex:0 0 auto;}
  @keyframes rise{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .grab{width:38px; height:4px; border-radius:2px; background:#c2b393; margin:10px auto 4px;}
  .sheet-head{padding:14px 22px 18px; border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--paper2),var(--paper));}
  .sheet-title{font-family:Georgia,"Apple SD Gothic Neo",serif; font-size:26px; font-weight:700; margin:0 0 4px; color:#241a12;}
  .sheet-meta{font-size:13px; color:var(--muted);}
  .oneliner{margin-top:14px; padding:13px 15px; background:#f6efdd; border-left:3px solid var(--leather); border-radius:0 8px 8px 0; font-size:15px; line-height:1.55; color:#3a2c1c; font-weight:500;}
  .sheet-body{padding:0;}
  .nav-row{display:flex; align-items:center; justify-content:space-between; margin-top:13px;}
  .vol-tag{font-size:12px; font-weight:700; color:#f3ecd8; background:var(--leather); padding:4px 11px; border-radius:13px; letter-spacing:1px;}
  .dots{display:flex; gap:6px; align-items:center;}
  .dots span{width:7px; height:7px; border-radius:50%; background:#cdbfa2; transition:all .2s;}
  .dots span.on{background:var(--gold); transform:scale(1.25);}
  .slide{padding:18px 22px calc(34px + env(safe-area-inset-bottom)); }
  .page-title{font-family:Georgia,"Apple SD Gothic Neo",serif; font-size:19px; font-weight:700; color:var(--leather); margin-bottom:16px;}
  .plot-flow p{font-size:15px; line-height:1.8; color:#33271a; margin:0 0 15px;}
  .plot-flow p:last-child{margin-bottom:0;}
  .chars-wrap .char{margin-bottom:14px; font-size:15px; line-height:1.55;}
  .swipe-hint{margin-top:22px; text-align:center; font-size:12.5px; color:#a8997d; font-style:italic;}
  .m-item{margin-bottom:18px;}
  .m-h{font-family:Georgia,"Apple SD Gothic Neo",serif; font-size:15.5px; font-weight:700; color:#5a3e2c; margin-bottom:6px;}
  .m-b{font-size:14.5px; line-height:1.75; color:#33271a;}
  .jumpbar{display:flex; align-items:center; justify-content:center; gap:8px; padding:9px 12px calc(11px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--paper2);}
  .jb{background:#e8dcc0; border:1.5px solid #cdbfa2; color:#5a4c38; border-radius:8px; padding:7px 12px; font-size:13px; font-weight:600;}
  .jb:disabled{opacity:0.35;}
  .jb-pos{font-size:12.5px; color:#8a7d66; font-weight:600; min-width:54px; text-align:center;}
  .section{margin-top:24px;}
  .section h3{font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--leather); margin:0 0 12px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .section h3::after{content:""; flex:1; height:1px; background:var(--line);}
  .char{margin-bottom:12px; font-size:14.5px; line-height:1.5;}
  .char b{color:#241a12;} .char span{color:#5a4c38;}
  .plot p{font-size:15px; line-height:1.72; color:#33271a; margin:0 0 14px; position:relative; padding-left:24px;}
  .plot p::before{content:attr(data-n); position:absolute; left:0; top:1px; font-family:Georgia,serif; font-weight:700; color:var(--gold); font-size:14px;}
  .meaning{font-size:15px; line-height:1.72; color:#33271a; background:#f6efdd; padding:16px 18px; border-radius:10px; border:1px solid #e0d4b8;}
  .tools{margin-top:26px; padding-top:20px; border-top:1px dashed var(--line);}
  .read-btn{width:100%; padding:13px; border-radius:10px; font-size:15px; font-weight:700; margin-bottom:14px; background:#e8dcc0; color:#5a4c38; border:1.5px solid #cdbfa2;}
  .read-btn.done{background:var(--leather); color:#f3ecd8; border-color:var(--leather);}
  .memo-label{font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:600;}
  textarea{width:100%; min-height:80px; resize:vertical; border:1.5px solid #cdbfa2; border-radius:10px; padding:11px 13px; font-size:14.5px; line-height:1.5; background:#fbf7ec; color:#33271a; font-family:inherit;}
  textarea:focus{outline:none; border-color:var(--leather);}
  .saved{font-size:12px; color:#5a8a5a; margin-top:6px; height:14px;}
  .close-x{position:absolute; top:12px; right:16px; width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,0.06); border:none; font-size:18px; color:#5a4c38; display:flex; align-items:center; justify-content:center; z-index:2;}
  footer{text-align:center; padding:24px 20px 40px; color:#4a3826; font-size:11px; line-height:1.6;}
</style>
</head>
<body>
  <header>
    <h1>소형 도서관</h1>
    <div class="sub">Tiny Library</div>
    <div class="tagline">저작권이 풀린 명작들. 짧게 다시 떠올리기.</div>
    <div class="filters" id="filters">
      <button class="chip on" data-f="all">전체</button>
      <button class="chip" data-f="세계">세계 명작</button>
      <button class="chip" data-f="동양">동양 명작</button>
      <button class="chip" data-f="한국">한국 고전</button>
      <button class="chip" data-f="현대">현대</button>
      <button class="chip" data-f="read">읽음</button>
    </div>
  </header>

  <div class="shelf-wrap" id="shelfWrap"></div>

  <footer>
    모든 작품은 저작권 보호 기간(작가 사후 70년)이 지난 퍼블릭 도메인입니다.<br>
    요약·해석은 기억을 돕기 위한 짧은 안내입니다.
  </footer>

  <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script src="books.js"></script>
<script>
(function(){
  const $=id=>document.getElementById(id);
  const wrap=$('shelfWrap'), overlay=$('overlay'), sheet=$('sheet');
  let filter='all', readSet=new Set(), memos={}, progress={};

  // 저장소 어댑터: Claude 아티팩트에서는 window.storage, PWA/브라우저에서는 localStorage
  const PFX='library:';
  const store = (typeof window.storage!=='undefined' && window.storage && window.storage.get)
    ? window.storage
    : {
        async get(k){ const v=localStorage.getItem(PFX+k); return v===null?null:{key:k,value:v}; },
        async set(k,v){ localStorage.setItem(PFX+k,v); return {key:k,value:v}; }
      };

  async function loadState(){
    try{ const r=await store.get('readSet'); if(r&&r.value) readSet=new Set(JSON.parse(r.value)); }catch(e){}
    try{ const m=await store.get('memos'); if(m&&m.value) memos=JSON.parse(m.value); }catch(e){}
    try{ const p=await store.get('progress'); if(p&&p.value) progress=JSON.parse(p.value); }catch(e){}
  }
  async function saveRead(){ try{ await store.set('readSet', JSON.stringify([...readSet])); }catch(e){} }
  async function saveMemos(){ try{ await store.set('memos', JSON.stringify(memos)); }catch(e){} }
  async function saveProgress(){ try{ await store.set('progress', JSON.stringify(progress)); }catch(e){} }

  function render(){
    wrap.innerHTML='';
    if(filter==='all'){
      renderShelf('세계 명작', BOOKS.filter(b=>b.tag==='세계'));
      renderShelf('동양 명작', BOOKS.filter(b=>b.tag==='동양'));
      renderShelf('한국 고전', BOOKS.filter(b=>b.tag==='한국'));
      renderShelf('현대', BOOKS.filter(b=>b.tag==='현대'));
    } else if(filter==='read'){
      const list=BOOKS.filter(b=>readSet.has(b.id));
      if(list.length) renderShelf('읽은 책', list);
      else wrap.innerHTML='<div style="padding:50px 20px;text-align:center;color:#6a5a44;font-size:14px;line-height:1.6;">아직 읽음으로 표시한 책이 없어요.<br>책을 펼쳐 “다 읽음”을 눌러보세요.</div>';
    } else {
      renderShelf(filter==='세계'?'세계 명작':filter==='동양'?'동양 명작':filter==='현대'?'현대':'한국 고전', BOOKS.filter(b=>b.tag===filter));
    }
  }
  function renderShelf(label, books){
    const shelf=document.createElement('div'); shelf.className='shelf';
    const lab=document.createElement('div'); lab.className='shelf-label'; lab.textContent=label;
    shelf.appendChild(lab);
    const row=document.createElement('div'); row.className='books';
    books.forEach(b=>row.appendChild(makeSpine(b)));
    shelf.appendChild(row); wrap.appendChild(shelf);
  }
  function makeSpine(b){
    const sp=document.createElement('div');
    sp.className='spine'+(readSet.has(b.id)?' read':'');
    sp.style.background=`linear-gradient(90deg, ${shade(b.spineColor,-12)}, ${b.spineColor} 30%, ${shade(b.spineColor,8)} 70%, ${shade(b.spineColor,-18)})`;
    sp.innerHTML=`<div class="spine-band top"></div><div class="spine-title">${b.title}</div><div class="spine-band bot"></div><div class="read-dot"></div>`;
    sp.addEventListener('click',()=>openBook(b));
    return sp;
  }
  function shade(hex,amt){
    const n=parseInt(hex.slice(1),16);
    let r=(n>>16)+amt, g=((n>>8)&255)+amt, bl=(n&255)+amt;
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); bl=Math.max(0,Math.min(255,bl));
    return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
  }
  let curBook=null, curPage=0, slides=[];

  function buildSlides(b){
    // 인물 → (줄거리 페이지들) → 해석  순서의 화면 배열
    const arr=[];
    arr.push({kind:'chars'});
    if(b.long && b.pages){
      b.pages.forEach((pg,i)=>arr.push({kind:'plot', idx:i}));
    } else if(b.plot){
      arr.push({kind:'plotSimple'});
    }
    if(b.bg) arr.push({kind:'bg'});
    if(b.symbols) arr.push({kind:'symbols'});
    arr.push({kind:'meaning'});
    return arr;
  }

  function openBook(b){
    curBook=b; slides=buildSlides(b);
    const saved=progress[b.id]||0;
    curPage=Math.min(Math.max(0,saved), slides.length-1);
    overlay.classList.add('show'); document.body.style.overflow='hidden';
    renderSheet();
  }

  function renderSheet(){
    const b=curBook, isRead=readSet.has(b.id), memo=memos[b.id]||'';
    const slide=slides[curPage];
    let inner='', volLabel='';

    if(slide.kind==='chars'){
      const charsHtml=b.chars.map(c=>`<div class="char"><b>${c[0]}</b> — <span>${c[1]}</span></div>`).join('');
      volLabel=b.charsVol||'등장인물';
      inner=`<div class="page-title">${b.charsTitle||'핵심 인물'}</div><div class="chars-wrap">${charsHtml}</div>
        <div class="swipe-hint">← 옆으로 넘기면 줄거리가 시작됩니다</div>`;
    } else if(slide.kind==='plot'){
      const pg=b.pages[slide.idx];
      volLabel=pg.vol||'줄거리';
      const psHtml=pg.ps.map(p=>`<p>${p}</p>`).join('');
      inner=`<div class="page-title">${pg.t}</div><div class="plot-flow">${psHtml}</div>`;
    } else if(slide.kind==='plotSimple'){
      volLabel='줄거리';
      const plotHtml=b.plot.map((p,i)=>`<p data-n="${i+1}.">${p}</p>`).join('');
      inner=`<div class="page-title">줄거리</div><div class="plot">${plotHtml}</div>`;
    } else if(slide.kind==='bg'){
      volLabel='배경';
      const bgHtml=b.bg.map(m=>`<div class="m-item"><div class="m-h">${m[0]}</div><div class="m-b">${m[1]}</div></div>`).join('');
      inner=`<div class="page-title">작가와 시대</div>${bgHtml}`;
    } else if(slide.kind==='symbols'){
      volLabel='상징';
      const syHtml=b.symbols.map(m=>`<div class="m-item"><div class="m-h">${m[0]}</div><div class="m-b">${m[1]}</div></div>`).join('');
      inner=`<div class="page-title">상징과 장치</div>${syHtml}`;
    } else if(slide.kind==='meaning'){
      volLabel='해석';
      let mHtml;
      if(Array.isArray(b.meaning)){
        mHtml=b.meaning.map(m=>`<div class="m-item"><div class="m-h">${m[0]}</div><div class="m-b">${m[1]}</div></div>`).join('');
      } else {
        mHtml=`<div class="meaning">${b.meaning}</div>`;
      }
      inner=`<div class="page-title">해석</div>${mHtml}
        <div class="tools">
          <button class="read-btn ${isRead?'done':''}" id="readBtn">${isRead?'✓ 다 읽은 책':'다 읽음으로 표시'}</button>
          <div class="memo-label">내 메모</div>
          <textarea id="memo" placeholder="생각나는 점, 기억하고 싶은 구절을 적어두세요.">${memo}</textarea>
          <div class="saved" id="savedMsg"></div>
        </div>`;
    }

    const dotsHtml=slides.map((_,i)=>`<span class="${i===curPage?'on':''}"></span>`).join('');

    sheet.innerHTML=`
      <button class="close-x" id="closeX">✕</button>
      <div class="grab"></div>
      <div class="sheet-head">
        <h2 class="sheet-title">${b.title}</h2>
        <div class="sheet-meta">${b.author} · ${b.origin} · ${b.year}년</div>
        <div class="oneliner">${b.oneLine}</div>
        <div class="nav-row">
          <div class="vol-tag">${volLabel}</div>
          <div class="dots">${dotsHtml}</div>
        </div>
      </div>
      <div class="sheet-body" id="sheetBody"><div class="slide" id="slide">${inner}</div></div>
      <div class="jumpbar">
        <button class="jb" id="jbFirst" ${curPage===0?'disabled':''} aria-label="첫 페이지">⏮ 처음</button>
        <button class="jb" id="jbPrev" ${curPage===0?'disabled':''} aria-label="이전">‹</button>
        <span class="jb-pos">${curPage+1} / ${slides.length}</span>
        <button class="jb" id="jbNext" ${curPage===slides.length-1?'disabled':''} aria-label="다음">›</button>
        <button class="jb" id="jbLast" ${curPage===slides.length-1?'disabled':''} aria-label="마지막 페이지">끝 ⏭</button>
      </div>`;
    sheet.scrollTop=0;
    const body=$('sheetBody'); if(body) body.scrollTop=0;

    $('closeX').addEventListener('click',closeBook);
    const jf=$('jbFirst'), jl=$('jbLast'), jp=$('jbPrev'), jn=$('jbNext');
    if(jf) jf.addEventListener('click',jumpFirst);
    if(jl) jl.addEventListener('click',jumpLast);
    if(jp) jp.addEventListener('click',()=>goPage(curPage-1));
    if(jn) jn.addEventListener('click',()=>goPage(curPage+1));
    bindReadMemo(b);
    bindSwipe();
  }

  function bindReadMemo(b){
    const rb=$('readBtn');
    if(rb) rb.addEventListener('click',()=>{
      if(readSet.has(b.id)) readSet.delete(b.id); else readSet.add(b.id);
      saveRead();
      const now=readSet.has(b.id);
      rb.className='read-btn '+(now?'done':''); rb.textContent=now?'✓ 다 읽은 책':'다 읽음으로 표시';
    });
    const mz=$('memo');
    if(mz){
      let t=null;
      mz.addEventListener('input',e=>{
        memos[b.id]=e.target.value; clearTimeout(t);
        t=setTimeout(async()=>{ await saveMemos(); const m=$('savedMsg'); if(m){m.textContent='저장됨'; setTimeout(()=>{if(m)m.textContent='';},1200);} },500);
      });
    }
  }

  function goPage(n){
    if(n<0 || n>=slides.length || n===curPage) return;
    const slideEl=$('slide');
    if(slideEl){
      slideEl.style.transition='transform .18s ease, opacity .18s ease';
      slideEl.style.transform = n>curPage ? 'translateX(-14px)' : 'translateX(14px)';
      slideEl.style.opacity='0';
    }
    setTimeout(()=>{ curPage=n; if(curBook){ progress[curBook.id]=curPage; saveProgress(); } renderSheet(); }, 130);
  }
  function jumpFirst(){ goPage(0); }
  function jumpLast(){ goPage(slides.length-1); }

  function bindSwipe(){
    const body=$('sheetBody');
    if(!body) return;
    let x0=null,y0=null,t0=0,active=false;
    body.addEventListener('touchstart',e=>{
      x0=e.touches[0].clientX; y0=e.touches[0].clientY; t0=Date.now(); active=true;
    },{passive:true});
    body.addEventListener('touchend',e=>{
      if(!active||x0===null) return; active=false;
      const dx=e.changedTouches[0].clientX-x0;
      const dy=e.changedTouches[0].clientY-y0;
      // 좌우 스와이프 = 페이지 넘김 (가로가 충분히 우세할 때만)
      if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
        if(dx<0) goPage(curPage+1);
        else goPage(curPage-1);
      }
      // 본문에서는 아래로 내려도 닫히지 않음 — 닫기는 상단 헤더에서만
    },{passive:true});

    // 아래로 드래그 닫기: 시트 상단(손잡이+헤더)에서만, 140px 이상 확실히 내렸을 때
    const head=sheet.querySelector('.sheet-head');
    const grab=sheet.querySelector('.grab');
    [head,grab].forEach(el=>{
      if(!el) return;
      let hy0=null,hx0=null;
      el.addEventListener('touchstart',e=>{
        hy0=e.touches[0].clientY; hx0=e.touches[0].clientX;
      },{passive:true});
      el.addEventListener('touchend',e=>{
        if(hy0===null) return;
        const dy=e.changedTouches[0].clientY-hy0;
        const dx=e.changedTouches[0].clientX-hx0;
        hy0=null;
        if(dy>140 && Math.abs(dy)>Math.abs(dx)*1.6) closeBook();
      },{passive:true});
    });
  }

  function closeBook(){
    if(curBook){ progress[curBook.id]=curPage; saveProgress(); }
    overlay.classList.remove('show'); document.body.style.overflow=''; render();
  }
  overlay.addEventListener('click',e=>{ if(e.target===overlay) closeBook(); });

  document.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on'); filter=c.dataset.f; render();
    });
  });

  (async()=>{ await loadState(); render(); })();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
})();
</script>
</body>
</html>
